set -g mouse on
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g default-terminal "screen-256color"
set -ag terminal-overrides ",*:RGB"
set -g history-limit 50000
set -g allow-rename off
set -sg escape-time 0

unbind C-b
set -g prefix C-a
bind C-a send-prefix
bind r source-file ~/.tmux.conf \; display "Config reloaded"

bind \\ split-window -h -c "#{pane_current_path}"
bind Enter split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %
bind c new-window -c "#{pane_current_path}"

bind -n M-h select-pane -L
bind -n M-j select-pane -D
bind -n M-k select-pane -U
bind -n M-l select-pane -R
bind -n M-H resize-pane -L 5
bind -n M-J resize-pane -D 5
bind -n M-K resize-pane -U 5
bind -n M-L resize-pane -R 5
bind -n M-n next-window
bind -n M-p previous-window

setw -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel
bind -T copy-mode-vi C-v send -X rectangle-toggle

set -g status-position top
set -g status-justify left
set -g status-style 'bg=colour234 fg=colour244'
set -g status-left '#[fg=colour208,bold] #S #[fg=colour238]│ '
set -g status-right '#[fg=colour244]%I:%M %p '
setw -g window-status-format '#[fg=colour238] #I #W '
setw -g window-status-current-format '#[fg=colour255,bold] #I #W '
setw -g window-status-separator ''
set -g pane-border-style 'fg=colour238'
set -g pane-active-border-style 'fg=colour208'

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @resurrect-capture-pane-contents 'on'
set -g @continuum-restore 'on'
set -g @continuum-save-interval '15'
run '~/.tmux/plugins/tpm/tpm'
